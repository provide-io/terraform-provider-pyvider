[project]
name = "terraform-provider-pyvider"
version = "0.0.1"
description = "The official Pyvider provider, built with Pyvider."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []
packages = []

[tool.pyvbuild]
provider_name = "pyvider"
version_source = "0.0.2-1"

[tool.flavor]
# Use the pyvider CLI entry point for the provider binary
entry_point = "pyvider.cli.__main__:main"
output_path = "dist/terraform-provider-pyvider"

[tool.flavor.metadata]
package_name = "terraform-provider-pyvider"
version = "0.1.0"

[tool.flavor.build]
# This meta package just brings together components
dependencies = [
    "../pyvider-telemetry",
    "../pyvider-rpcplugin",
    "../pyvider-cty",
    "../pyvider-components", 
    "../pyvider",
]
exclude = [
    "**/.terraform/**",
    "**/.venv/**", 
    "**/__pycache__/**",
    "**/*.pyc",
    "**/*.pyo",
    "**/.DS_Store",
]

[tool.flavor.signing]
private_key_path = "keys/provider-private.key"
public_key_path = "keys/provider-public.key"

[tool.flavor.execution]
# Test whitelist approach - remove everything except essentials
[tool.flavor.execution.runtime]
[tool.flavor.execution.runtime.env]
# Remove ALL environment variables first
unset = ["*"]
# Preserve only what we need
pass = [
    "PATH",                    # Need PATH to find executables
    "HOME",                    # Home directory
    "USER",                    # Username
    "LANG",                    # Locale
    "LC_*",                    # Locale settings
    "TERM",                    # Terminal type
    "TF_*",                    # All Terraform variables
    "FLAVOR_*",                # Flavor's own variables
    "RUST_LOG",                # For our debug logging
    "PYVIDER_*",               # Pyvider settings
    "GO*"                      # Go environment variables
]
# Map the magic cookie as needed
map = { TF_PLUGIN_MAGIC_COOKIE = "PLUGIN_MAGIC_COOKIE_VALUE" }
# Set specific values
set = { PYVIDER_MODE = "test_whitelist", TEST_ENV = "clean_environment", PLUGIN_MAGIC_COOKIE_KEY = "TF_PLUGIN_MAGIC_COOKIE" }
