[project]
name = "terraform-provider-pyvider"
version = "0.0.1"
description = "The official Pyvider provider, built with Pyvider."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = []
packages = []

[tool.pyvbuild]
provider_name = "pyvider"
version_source = "0.0.2-1"

[tool.flavor]
# Use the pyvider CLI entry point for the provider binary
entry_point = "pyvider.cli.__main__:main"
output_path = "dist/terraform-provider-pyvider"

[tool.flavor.metadata]
package_name = "terraform-provider-pyvider"
version = "0.1.0"

[tool.flavor.build]
# This meta package just brings together components
dependencies = [
    "../pyvider-telemetry",
    "../pyvider-rpcplugin",
    "../pyvider-cty",
    "../pyvider-components", 
    "../pyvider",
]
exclude = [
    "**/.terraform/**",
    "**/.venv/**", 
    "**/__pycache__/**",
    "**/*.pyc",
    "**/*.pyo",
    "**/.DS_Store",
]

[tool.flavor.signing]
private_key_path = "keys/provider-private.key"
public_key_path = "keys/provider-public.key"

[tool.flavor.execution]
# Runtime environment configuration for Terraform provider protocol
[tool.flavor.execution.runtime]
[tool.flavor.execution.runtime.env]
# Tell pyvider to look for TF_PLUGIN_MAGIC_COOKIE environment variable
set = { PLUGIN_MAGIC_COOKIE_KEY = "TF_PLUGIN_MAGIC_COOKIE" }
# Map the TF_PLUGIN_MAGIC_COOKIE value to PLUGIN_MAGIC_COOKIE_VALUE for pyvider
map = { TF_PLUGIN_MAGIC_COOKIE = "PLUGIN_MAGIC_COOKIE_VALUE" }
# Ensure required Terraform variables are passed through
pass = ["TF_LOG", "TF_LOG_PATH", "TF_ACC"]
