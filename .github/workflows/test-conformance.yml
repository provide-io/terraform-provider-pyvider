name: 🧪 Provider Conformance Tests

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Build workflow run ID (required)'
        required: true
        type: string
  workflow_run:
    workflows: ["🏗️ Build Provider Binary"]
    types:
      - completed

env:
  PYTHON_VERSION: '3.11'
  PYTHONIOENCODING: utf-8

jobs:
  # Check if we should run tests (skip if workflow_run failed)
  check:
    name: 🔍 Check Build Status
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      build_run_id: ${{ steps.check.outputs.build_run_id }}

    steps:
      - name: 📋 Determine build run ID
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BUILD_RUN_ID="${{ github.event.workflow_run.id }}"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "build_run_id=${BUILD_RUN_ID}" >> $GITHUB_OUTPUT
            echo "✅ Running tests with artifacts from build workflow run: ${BUILD_RUN_ID}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.build_run_id }}" ]]; then
            BUILD_RUN_ID="${{ inputs.build_run_id }}"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "build_run_id=${BUILD_RUN_ID}" >> $GITHUB_OUTPUT
            echo "✅ Running tests with artifacts from specified build run: ${BUILD_RUN_ID}"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "❌ ERROR: This workflow requires artifacts from the Build Provider Binary workflow"
            exit 1
          fi

  conformance:
    name: 🧪 Test ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            target: linux_amd64
          - os: macos-15
            platform: darwin
            arch: arm64
            target: darwin_arm64
          - os: windows-2025
            platform: windows
            arch: amd64
            target: windows_amd64
          - os: windows-11-arm
            platform: windows
            arch: arm64
            target: windows_arm64

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.platform == 'windows' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 📖 Read VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "🧪 Testing version: ${VERSION}"

      - name: 📥 Download provider artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: provider-${{ matrix.target }}
          path: provider-binary
          run-id: ${{ needs.check.outputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: 📦 Extract provider binary
        shell: bash
        run: |
          cd provider-binary
          echo "📦 Contents of provider-binary directory:"
          ls -la
          echo ""

          echo "📦 Extracting provider archive..."
          unzip terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip

          # Determine binary name
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            BINARY="terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}.exe"
          else
            BINARY="terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}"
          fi

          chmod +x "$BINARY" 2>/dev/null || true

          echo ""
          echo "✅ Extracted provider binary:"
          ls -la "$BINARY"

      - name: 🔍 Verify provider binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            PROVIDER_BINARY="provider-binary/terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}.exe"
          else
            PROVIDER_BINARY="provider-binary/terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}"
          fi

          echo "════════════════════════════════════════════════════════════════"
          echo "🔍 PROVIDER BINARY VERIFICATION"
          echo "════════════════════════════════════════════════════════════════"
          echo ""

          echo "📋 Binary information:"
          ls -lah "$PROVIDER_BINARY"
          echo ""

          echo "📋 File type:"
          file "$PROVIDER_BINARY" || echo "file command not available"
          echo ""

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            echo "📋 Library dependencies (ldd):"
            ldd "$PROVIDER_BINARY" 2>&1 || echo "ldd not available or binary not dynamically linked"
          elif [[ "${{ matrix.platform }}" == "darwin" ]]; then
            echo "📋 Library dependencies (otool):"
            otool -L "$PROVIDER_BINARY" 2>&1 || echo "otool not available"
          fi
          echo ""

          echo "📋 Testing provider executable:"
          if "$PROVIDER_BINARY" --version 2>&1 | head -10; then
            echo "✅ Provider supports --version"
          else
            echo "⚠️  Provider doesn't support --version, trying without arguments..."
            if timeout 5 "$PROVIDER_BINARY" 2>&1 | head -10; then
              echo "✅ Provider is executable"
            else
              echo "❌ Provider failed to execute"
              exit 1
            fi
          fi

          echo ""
          echo "✅ Provider binary verification complete"
          echo "════════════════════════════════════════════════════════════════"

      - name: 🔌 Install provider to Terraform plugin directory
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            SOURCE="provider-binary/terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}.exe"
          else
            SOURCE="provider-binary/terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}"
          fi
          chmod +x .github/scripts/install-provider.sh
          .github/scripts/install-provider.sh \
            "${{ steps.version.outputs.VERSION }}" \
            "${{ matrix.target }}" \
            "$SOURCE"

      - name: 📝 Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.6

      - name: 🐍 Setup Python
        if: env.ACT != 'true' && github.actor != 'nektos/act'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV (for tofusoup)
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: 🍲 Install tofusoup
        shell: bash
        run: |
          uv tool install tofusoup
          echo "✅ Tofusoup installed"
          soup --version

      - name: "🔥 Smoke Test 1: Production Mode (Minimal Config)"
        shell: bash
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🔥 SMOKE TEST 1: Production Mode (Minimal Configuration)"
          echo "════════════════════════════════════════════════════════════════"

          mkdir -p /tmp/smoke-test-production
          cd /tmp/smoke-test-production

          cat > main.tf << 'EOF'
          terraform {
            required_providers {
              pyvider = {
                source  = "local/providers/pyvider"
                version = ">= 0.0.1"
              }
            }
          }

          provider "pyvider" {}

          output "test" {
            value = "smoke test - production mode"
          }
          EOF

          echo "📋 Terraform configuration:"
          cat main.tf
          echo ""

          echo "🔧 Running: tofu init"
          tofu init
          echo ""

          echo "📊 Running: tofu plan"
          tofu plan
          echo ""

          echo "✅ PASS: Smoke test 1 completed successfully"
          echo "════════════════════════════════════════════════════════════════"

      - name: "🔥 Smoke Test 2: Test Mode Rejection (WITHOUT PYVIDER_TESTMODE)"
        shell: bash
        env:
          PYVIDER_PRIVATE_STATE_SHARED_SECRET: "test-secret-for-ci-only-not-production"
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🔥 SMOKE TEST 2: Test Mode Rejection"
          echo "════════════════════════════════════════════════════════════════"

          cd examples/resource/private_state_verifier

          # Ensure PYVIDER_TESTMODE is NOT set
          unset PYVIDER_TESTMODE

          echo "🔧 Running: tofu init"
          tofu init
          echo ""

          echo "📊 Running: tofu plan (expecting rejection...)"
          set +e
          tofu plan 2>&1 | tee /tmp/testmode-false.log
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ $PLAN_EXIT_CODE -eq 0 ]; then
            echo ""
            echo "❌ FAIL: Test-only component was NOT rejected as expected"
            cat /tmp/testmode-false.log
            exit 1
          else
            if grep -qi "test-only.*requires test mode\|test mode.*required" /tmp/testmode-false.log; then
              echo ""
              echo "✅ PASS: Test-only component correctly rejected without test mode"
            else
              echo ""
              echo "❌ FAIL: Plan failed but with unexpected error (exit code: $PLAN_EXIT_CODE)"
              cat /tmp/testmode-false.log
              exit 1
            fi
          fi
          echo "════════════════════════════════════════════════════════════════"

      - name: "🔥 Smoke Test 3: Test Mode Success (WITH PYVIDER_TESTMODE)"
        shell: bash
        env:
          PYVIDER_TESTMODE: true
          PYVIDER_PRIVATE_STATE_SHARED_SECRET: "test-secret-for-ci-only-not-production"
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🔥 SMOKE TEST 3: Test Mode Success"
          echo "════════════════════════════════════════════════════════════════"

          cd examples/resource/private_state_verifier

          # Clean up from previous test
          rm -rf .terraform terraform.tfstate* .terraform.lock.hcl

          export PYVIDER_TESTMODE=true
          export PYVIDER_PRIVATE_STATE_SHARED_SECRET="${PYVIDER_PRIVATE_STATE_SHARED_SECRET}"
          echo "   PYVIDER_TESTMODE=${PYVIDER_TESTMODE}"
          echo ""

          echo "🔧 Running: tofu init"
          tofu init
          echo ""

          echo "📊 Running: tofu plan"
          tofu plan
          echo ""

          echo "🚀 Running: tofu apply -auto-approve"
          tofu apply -auto-approve
          echo ""

          echo "📤 Running: tofu output"
          tofu output
          echo ""

          echo "✅ PASS: Test-only component works with test mode enabled"
          echo "════════════════════════════════════════════════════════════════"

      - name: 🧪 Run Full Conformance Tests
        shell: bash
        env:
          TF_LOG: DEBUG
          PYVIDER_TESTMODE: true
          PYVIDER_PRIVATE_STATE_SHARED_SECRET: "test-secret-for-ci-only-not-production"
        run: |
          export PYVIDER_TESTMODE=true
          export PYVIDER_PRIVATE_STATE_SHARED_SECRET="${PYVIDER_PRIVATE_STATE_SHARED_SECRET}"

          echo "════════════════════════════════════════════════════════════════"
          echo "🧪 FULL CONFORMANCE TEST SUITE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "🔍 Running conformance tests on all examples..."
          echo "   PYVIDER_TESTMODE=${PYVIDER_TESTMODE}"
          echo "   Platform: ${{ matrix.target }}"
          echo ""

          cd examples
          soup stir --recursive

          echo ""
          echo "✅ All provider conformance tests passed!"
          echo "════════════════════════════════════════════════════════════════"

      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: conformance-test-logs-${{ matrix.target }}
          path: |
            examples/**/.soup/logs/*.log
            examples/**/.soup/logs/terraform.log
            examples/**/.terraform.lock.hcl
            examples/**/terraform.tfstate*
            /tmp/smoke-test-production/.terraform/
            /tmp/smoke-test-production/terraform.tfstate*
            /tmp/smoke-test-production/.terraform.lock.hcl
            /tmp/testmode-*.log
            examples/resource/private_state_verifier/.terraform/
            examples/resource/private_state_verifier/terraform.tfstate*
            examples/resource/private_state_verifier/.terraform.lock.hcl
          retention-days: 7
          if-no-files-found: warn

  summary:
    name: 📋 Test Summary
    needs: [check, conformance]
    if: always() && needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: 📊 Generate Summary
        run: |
          if [[ "${{ needs.conformance.result }}" == "success" ]]; then
            echo "## ✅ All Conformance Tests Passed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All provider conformance tests completed successfully:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Smoke Test 1: Production mode (minimal config)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Smoke Test 2: Test mode rejection (without PYVIDER_TESTMODE)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Smoke Test 3: Test mode success (with PYVIDER_TESTMODE)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Full conformance suite (all examples)" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "## ❌ Some Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the test logs for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Test logs are available in the workflow artifacts." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
