name: 🚀 Build and Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false
      generate_docs:
        description: 'Generate and commit documentation'
        required: false
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: 📦 Build Provider Binary
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            target: linux_amd64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: linux_arm64
          - os: macos-15
            platform: darwin
            arch: arm64
            target: darwin_arm64
          - os: macos-15-intel
            platform: darwin
            arch: amd64
            target: darwin_amd64
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout terraform-provider-pyvider
        uses: actions/checkout@v4
        with:
          path: terraform-provider-pyvider

      - name: 📥 Checkout pyvider
        uses: actions/checkout@v4
        with:
          repository: provide-io/pyvider
          path: pyvider

      - name: 📥 Checkout pyvider-components
        uses: actions/checkout@v4
        with:
          repository: provide-io/pyvider-components
          path: pyvider-components

      - name: 📥 Checkout provide-foundation
        uses: actions/checkout@v4
        with:
          repository: provide-io/provide-foundation
          path: provide-foundation

      - name: 📖 Read VERSION
        id: version
        run: |
          cd terraform-provider-pyvider
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Building version: ${VERSION}"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV
        uses: astral-sh/setup-uv@v4
        continue-on-error: true
        with:
          enable-cache: true

      - name: 🔧 Install dependencies
        run: |
          cd terraform-provider-pyvider
          # Install local editable packages first
          uv pip install -e ../provide-foundation
          uv pip install -e ../pyvider
          uv pip install -e ../pyvider-components
          # Install project dependencies and dev tools (flavorpack, plating)
          # Dev tools are NOT included in the PSP package - only used for building
          uv sync --group dev

      - name: 🔑 Generate temporary signing keys
        run: |
          cd terraform-provider-pyvider
          # Generate Ed25519 keys using flavor keygen (run via uv to use venv)
          uv run flavor keygen --out-dir keys
          echo "✅ Generated temporary signing keys"
          ls -la keys/

      - name: 🧹 Clear package caches
        run: |
          echo "🧹 Clearing pip and uv caches to ensure fresh PyPI index..."
          pip cache purge 2>/dev/null || echo "No pip cache to clear"
          uv cache clean 2>/dev/null || echo "No uv cache to clear"
          echo "✅ Caches cleared"

      - name: 🏗️ Build PSP package
        run: |
          cd terraform-provider-pyvider
          # The version is already set dynamically from VERSION file
          # No need to update pyproject.toml as it uses dynamic = ["version"]

          # Build the PSP package with retry logic for transient PyPI issues
          # Note: flavorpack >= 0.0.5 automatically uses manylinux2014 wheels on Linux
          echo "🏗️ Building PSP package (with retry on failure)..."

          if ! uv run flavor pack \
            --manifest pyproject.toml \
            --output "terraform-provider-pyvider.psp"; then
            echo "⚠️ First build attempt failed, waiting 30s and retrying..."
            sleep 30

            # Force PyPI index refresh by checking latest version
            python3 -m pip index versions flavorpack 2>/dev/null || true

            # Retry build
            uv run flavor pack \
              --manifest pyproject.toml \
              --output "terraform-provider-pyvider.psp"
          fi

          echo "✅ Built PSP package:"
          ls -la terraform-provider-pyvider.psp

      - name: 📦 Package for Terraform
        run: |
          cd terraform-provider-pyvider
          # Rename PSP to Terraform provider binary format
          BINARY_NAME="terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}"
          cp terraform-provider-pyvider.psp "$BINARY_NAME"
          chmod +x "$BINARY_NAME"

          # Test execution with timing and launch-context
          echo "🧪 Testing provider binary execution..."
          echo "First run (cold start):"
          time ./"$BINARY_NAME" launch-context || true

          echo -e "\nSecond run (warm start):"
          time ./"$BINARY_NAME" launch-context || true

          # Create zip archive with proper naming
          ZIP_NAME="terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip"
          zip "$ZIP_NAME" "$BINARY_NAME"
          
          echo "📦 Created Terraform provider package:"
          ls -la "$ZIP_NAME"
          
          # Test unzip to verify
          unzip -l "$ZIP_NAME"
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.target }}
          path: |
            terraform-provider-pyvider/terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip
          retention-days: 7

  test:
    name: 🧪 Test Provider Conformance
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            target: linux_amd64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: linux_arm64
          - os: macos-15
            platform: darwin
            arch: arm64
            target: darwin_arm64
          - os: macos-15-intel
            platform: darwin
            arch: amd64
            target: darwin_amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout terraform-provider-pyvider
        uses: actions/checkout@v4
        with:
          path: terraform-provider-pyvider

      - name: 📖 Read VERSION
        id: version
        run: |
          cd terraform-provider-pyvider
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "🧪 Testing version: ${VERSION}"

      - name: 📥 Download provider binary
        uses: actions/download-artifact@v4
        with:
          name: provider-${{ matrix.target }}
          path: provider-binary

      - name: 📦 Extract provider binary
        run: |
          cd provider-binary
          unzip terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_${{ matrix.target }}.zip
          chmod +x terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}
          echo "✅ Extracted provider binary:"
          ls -la terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }}

      - name: 🔧 Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest
          tofu_wrapper: false

      - name: 🔌 Install provider locally
        run: |
          # Install to Terraform plugin directory with full version (including prerelease suffix)
          PLUGIN_DIR="${HOME}/.terraform.d/plugins/local/providers/pyvider/${{ steps.version.outputs.VERSION }}/${{ matrix.target }}"
          mkdir -p "$PLUGIN_DIR"

          # Copy provider binary (Terraform expects binary without version suffix in filename)
          cp provider-binary/terraform-provider-pyvider_v${{ steps.version.outputs.VERSION }} \
             "$PLUGIN_DIR/terraform-provider-pyvider"
          chmod +x "$PLUGIN_DIR/terraform-provider-pyvider"

          echo "✅ Provider installed to: $PLUGIN_DIR"
          ls -la "$PLUGIN_DIR"

      - name: 🔍 Verify provider binary
        run: |
          PROVIDER_PATH="${HOME}/.terraform.d/plugins/local/providers/pyvider/${{ steps.version.outputs.VERSION }}/${{ matrix.target }}/terraform-provider-pyvider"

          echo "🔍 Verifying provider binary..."
          echo "Provider path: $PROVIDER_PATH"
          echo ""

          echo "File info:"
          ls -lah "$PROVIDER_PATH"
          file "$PROVIDER_PATH" || echo "file command not available"
          echo ""

          echo "Testing provider executable:"
          # Try to run the provider (may not support --version, but should at least execute)
          if "$PROVIDER_PATH" --version 2>&1; then
            echo "✅ Provider supports --version"
          else
            echo "⚠️  Provider doesn't support --version (this is OK for some providers)"
          fi

          echo ""
          echo "Checking if provider can execute:"
          if "$PROVIDER_PATH" 2>&1 | head -5; then
            echo "✅ Provider binary is executable"
          else
            echo "❌ Provider binary failed to execute"
            exit 1
          fi

      - name: 🐍 Setup Python for tofusoup
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV for tofusoup
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: 🧪 Smoke test - Test mode validation
        env:
          TF_LOG: DEBUG
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "🧪 SMOKE TEST: Test Mode Validation"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "This test validates that:"
          echo "  1️⃣  Test-only components FAIL without PYVIDER_TESTMODE"
          echo "  2️⃣  Test-only components SUCCEED with PYVIDER_TESTMODE=true"
          echo ""

          # Update version constraint to match the version being tested
          cd terraform-provider-pyvider/examples/resource/private_state_verifier
          sed -i.bak 's/version = ">= [^"]*"/version = "${{ steps.version.outputs.VERSION }}"/' provider.tf

          echo "📋 Provider configuration:"
          cat provider.tf
          echo ""

          echo "────────────────────────────────────────────────────────────────"
          echo "1️⃣  TEST: Test-only component WITHOUT test mode (should FAIL)"
          echo "────────────────────────────────────────────────────────────────"
          echo ""

          # Ensure PYVIDER_TESTMODE is NOT set
          unset PYVIDER_TESTMODE

          echo "🔧 Running: tofu init"
          tofu init
          echo ""

          echo "📊 Running: tofu plan (expecting failure...)"
          if tofu plan 2>&1 | tee /tmp/testmode-false.log; then
            echo ""
            echo "❌ FAIL: Test-only component should have been rejected!"
            echo "   Test mode was not enabled, but the plan succeeded."
            exit 1
          else
            echo ""
            if grep -qi "test-only.*requires test mode\|test mode.*required" /tmp/testmode-false.log; then
              echo "✅ PASS: Test-only component correctly rejected without test mode"
            else
              echo "❌ FAIL: Plan failed but not with expected test mode error"
              echo "   Expected: 'test-only resource requires test mode'"
              echo "   Check logs for actual error"
              cat /tmp/testmode-false.log
              exit 1
            fi
          fi

          echo ""
          echo "────────────────────────────────────────────────────────────────"
          echo "2️⃣  TEST: Test-only component WITH test mode (should SUCCEED)"
          echo "────────────────────────────────────────────────────────────────"
          echo ""

          # Enable test mode
          export PYVIDER_TESTMODE=true
          echo "   PYVIDER_TESTMODE=${PYVIDER_TESTMODE}"
          echo ""

          # Clean up from previous test
          rm -rf .terraform terraform.tfstate* .terraform.lock.hcl

          echo "🔧 Running: tofu init"
          tofu init
          echo ""

          echo "📊 Running: tofu plan"
          tofu plan
          echo ""

          echo "🚀 Running: tofu apply -auto-approve"
          tofu apply -auto-approve
          echo ""

          echo "📤 Running: tofu output"
          tofu output
          echo ""

          echo "✅ PASS: Test-only component works with test mode enabled"
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "✅ ALL SMOKE TESTS PASSED!"
          echo "════════════════════════════════════════════════════════════════"

      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs-${{ matrix.target }}
          path: |
            /tmp/testmode-*.log
            terraform-provider-pyvider/examples/resource/private_state_verifier/terraform.tfstate*
            terraform-provider-pyvider/examples/resource/private_state_verifier/.terraform.lock.hcl
            terraform-provider-pyvider/examples/resource/private_state_verifier/.terraform/
          retention-days: 7
          if-no-files-found: warn

  release:
    name: 🎉 Create Release
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🤖 Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PROVIDE_BOT_APP_ID }}
          private-key: ${{ secrets.PROVIDE_BOT_PRIVATE_KEY }}

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ steps.app-token.outputs.token }}

      - name: 📖 Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Releasing version: ${VERSION}"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: 📚 Generate Documentation
        if: inputs.generate_docs == true
        run: |
          echo "📝 Generating documentation and examples with plating..."

          # Install project dependencies and dev tools (includes plating and pyvider-components)
          uv sync --group dev

          # Run full documentation build (generates docs + examples + validation)
          ./scripts/build-docs.sh

          echo "✅ Documentation and examples generated"
          ls -la docs/

      - name: 💾 Commit Documentation
        if: inputs.generate_docs == true
        run: |
          # Configure git with providebot[bot] identity
          # The App ID will need to be replaced with your actual app's user ID
          git config user.name "providebot[bot]"
          git config user.email "178697328+providebot[bot]@users.noreply.github.com"

          # Add generated documentation
          git add docs/

          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "📝 No documentation changes to commit"
          else
            git commit -m "📚 Generate documentation for v${{ steps.version.outputs.VERSION }}"
            git push origin main
            echo "✅ Documentation committed and pushed by providebot[bot]"
          fi

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 📁 Organize release files
        run: |
          mkdir -p release
          
          # Move all zip files to release directory
          find artifacts -name "*.zip" -type f -exec mv {} release/ \;
          
          # Copy and rename manifest file
          cp terraform-registry-manifest.json "release/terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_manifest.json"
          
          echo "📦 Release files:"
          ls -la release/
      
      - name: 🔧 Generate checksums
        run: |
          cd release
          
          # Generate SHA256 checksums for all files
          sha256sum * > "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS"
          
          echo "📝 Checksums:"
          cat "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS"
      
      - name: 🔐 Sign checksums with GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          chmod +x .github/scripts/sign-release.sh
          .github/scripts/sign-release.sh release/
          
          echo "✅ Signatures created:"
          ls -la release/*.sig
      
      - name: 🔍 Verify release artifacts
        run: |
          cd release
          echo "📋 Verifying release artifacts for Terraform Registry..."
          
          # Check all required files exist
          REQUIRED_FILES=(
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_linux_amd64.zip"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_linux_arm64.zip"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_darwin_amd64.zip"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_darwin_arm64.zip"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_manifest.json"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS"
            "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS.sig"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done
          
          # Verify SHA256SUMS contains all required entries
          echo -e "\n📝 Checking SHA256SUMS entries..."
          for platform in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            if grep -q "${platform}.zip" "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS"; then
              echo "✅ SHA256SUMS contains ${platform}"
            else
              echo "❌ SHA256SUMS missing ${platform}"
              exit 1
            fi
          done
          
          # Verify manifest.json
          if grep -q "manifest.json" "terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS"; then
            echo "✅ SHA256SUMS contains manifest.json"
          else
            echo "❌ SHA256SUMS missing manifest.json"
            exit 1
          fi
          
          echo -e "\n✅ All release artifacts verified!"
      
      - name: 📝 Generate release notes
        run: |
          cat > release-notes.md << EOF
          # Terraform Provider Pyvider v${{ steps.version.outputs.VERSION }}
          
          ## 📦 Installation
          
          ### Terraform Registry (Coming Soon)
          \`\`\`hcl
          terraform {
            required_providers {
              pyvider = {
                source  = "provide-io/pyvider"
                version = "${{ steps.version.outputs.VERSION }}"
              }
            }
          }
          \`\`\`
          
          ### Manual Installation
          1. Download the appropriate package for your platform from the assets below
          2. Extract the archive to get the provider binary
          3. Place it in your Terraform plugins directory
          
          ## 🔒 Verification
          
          Verify your download with:
          \`\`\`bash
          # Download the SHA256SUMS and signature files
          curl -LO https://github.com/provide-io/terraform-provider-pyvider/releases/download/v${{ steps.version.outputs.VERSION }}/terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS
          curl -LO https://github.com/provide-io/terraform-provider-pyvider/releases/download/v${{ steps.version.outputs.VERSION }}/terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS.sig
          
          # Verify the signature
          gpg --verify terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS.sig terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS
          
          # Verify the checksum
          sha256sum -c terraform-provider-pyvider_${{ steps.version.outputs.VERSION }}_SHA256SUMS 2>&1 | grep OK
          \`\`\`
          
          ## 📋 Supported Platforms
          
          - Linux AMD64
          - Linux ARM64
          - macOS ARM64 (Apple Silicon)
          - macOS AMD64 (Intel)
          
          ## 🚀 What's New
          
          Built with Pyvider framework - Python-based Terraform provider development.
          EOF
      
      - name: 🏷️ Create Git tag
        run: |
          # Configure git with providebot[bot] identity
          git config user.name "providebot[bot]"
          git config user.email "178697328+providebot[bot]@users.noreply.github.com"

          # Create and push tag (ensure it exists before release)
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}" || echo "Tag might already exist"
          git push origin "v${{ steps.version.outputs.VERSION }}" || echo "Tag already exists on remote"
      
      - name: 🚀 Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ steps.version.outputs.VERSION }}"
          name: "v${{ steps.version.outputs.VERSION }}"
          bodyFile: "release-notes.md"
          artifacts: "release/*"
          prerelease: ${{ inputs.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}