name: 🧪 Provider Conformance Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - '.github/workflows/conformance-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  conformance:
    name: 🍲 Soup Conformance Tests
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            target: linux_amd64
          - os: macos-15
            platform: darwin
            arch: arm64
            target: darwin_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📖 Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Testing version: ${VERSION}"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🔧 Install dependencies
        run: |
          uv venv
          # Install project dependencies and dev tools
          uv sync --group dev

      - name: 🏗️ Build provider
        run: |
          uv run flavor helpers build
          uv run flavor pack --progress

      - name: 📦 Install provider locally
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          TARGET="${PLATFORM}_${ARCH}"

          # Create plugin directory
          PLUGIN_DIR="$HOME/.terraform.d/plugins/local/providers/pyvider/${VERSION}/${TARGET}"

          mkdir -p "$PLUGIN_DIR"
          cp "dist/terraform-provider-pyvider.psp" "${PLUGIN_DIR}/terraform-provider-pyvider"
          chmod +x "${PLUGIN_DIR}/terraform-provider-pyvider"

          echo "✅ Provider installed to: ${PLUGIN_DIR}"

      - name: 🍲 Install tofusoup
        run: |
          uv tool install tofusoup
          echo "✅ Tofusoup installed"
          soup --version

      - name: 📝 Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.10.6

      - name: 🧪 Run conformance tests with soup stir
        env:
          TF_LOG: DEBUG
          PYVIDER_TESTMODE: true
          PYVIDER_PRIVATE_STATE_SHARED_SECRET: "test-secret-for-ci-only-not-production"
        run: |
          # Export environment variables for all subprocesses
          export PYVIDER_TESTMODE=true
          export PYVIDER_PRIVATE_STATE_SHARED_SECRET="${PYVIDER_PRIVATE_STATE_SHARED_SECRET}"

          echo "🔍 Running conformance tests on all examples..."
          echo "   PYVIDER_TESTMODE=${PYVIDER_TESTMODE}"
          echo "   Platform: ${{ matrix.target }}"

          # Update version constraint in all provider.tf files
          find examples -name "provider.tf" -type f -exec sed -i.bak \
            's/version = ">= [^"]*"/version = "${{ steps.version.outputs.VERSION }}"/' {} \;

          echo "✅ Updated all provider.tf files with version ${{ steps.version.outputs.VERSION }}"

          # Show a sample provider.tf to verify
          echo "📋 Sample provider.tf configuration:"
          find examples -name "provider.tf" -type f | head -1 | xargs cat
          echo ""

          # Run soup stir on all examples recursively
          cd examples
          soup stir --recursive

          echo ""
          echo "✅ All provider conformance tests passed!"

      - name: 📤 Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-test-logs-${{ matrix.target }}
          path: |
            examples/**/.soup/logs/*.log
          retention-days: 7
